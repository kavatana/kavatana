name: Portfolio improvement
description: Propose a focused improvement to public proof, accessibility, or maintainability
title: 'enhancement: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who is affected, and what is difficult or unclear today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      description: List objective conditions that would prove the improvement complete.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reference
      description: Link to public-safe examples, standards, screenshots, or current behavior.
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries and non-goals
      description: Note privacy, claim, accessibility, licensing, or compatibility constraints and what should remain untouched.
    validations:
      required: true
