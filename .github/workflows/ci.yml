name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Run Typecheck
      run: npm run typecheck
      
    - name: Run Lint
      run: npm run lint
      
    - name: Build
      run: npm run generate
